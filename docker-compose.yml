version: "3.8"

# Nokia Monitoring Stack — gnmic + Prometheus
# Grafana is running separately; connect it by adding your Grafana container's
# network to this stack (see bottom of file), OR expose Prometheus on a host port
# and point Grafana at http://<host-ip>:9090

services:

  # ─────────────────────────────────────────────
  # gnmic — gNMI collector, exposes Prometheus metrics
  # ─────────────────────────────────────────────
  gnmic:
    image: ghcr.io/openconfig/gnmic:latest
    container_name: gnmic
    restart: unless-stopped
    volumes:
      - ./gnmic/gnmic.yaml:/app/gnmic.yaml:ro
    command: subscribe --config /app/gnmic.yaml
    ports:
      - "9804:9804"       # Prometheus scrape endpoint
    networks:
      - nokia-monitoring
    # Optional: set resource limits for large device counts
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512m

  # ─────────────────────────────────────────────
  # Prometheus — scrapes gnmic, stores time-series data
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-nokia
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"   # Keep 90 days of data
      - "--web.enable-lifecycle"               # Allow config reload via API
    ports:
      - "9090:9090"       # Prometheus UI + API (point Grafana here)
    networks:
      - nokia-monitoring
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: lets containers reach the host by name
    depends_on:
      - gnmic

networks:
  nokia-monitoring:
    name: nokia-monitoring

  # ── Connecting to your existing Grafana container ──────────────────────────
  # If your Grafana container is on a named Docker network, add it here so
  # Prometheus is reachable by container name (no host IP needed):
  #
  # grafana-net:
  #   external: true
  #   name: <your-grafana-network-name>   # find with: docker inspect <grafana-container> | grep NetworkMode
  #
  # Then also add "grafana-net" to the prometheus service's networks list,
  # and in Grafana use: http://prometheus-nokia:9090 as the datasource URL.
  # ───────────────────────────────────────────────────────────────────────────

volumes:
  prometheus-data:
    name: prometheus-nokia-data
